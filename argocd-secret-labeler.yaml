# Lightweight controller that watches for Secrets containing the marker key
# "managed-by: argocd-cluster-attach" and automatically adds the
# argocd.argoproj.io/secret-type=cluster label for ArgoCD discovery.
# This is currently required due to the limitations of the AddonConfig templating
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-secret-labeler
  namespace: demo1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-secret-labeler
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-secret-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-secret-labeler
subjects:
- kind: ServiceAccount
  name: argocd-secret-labeler
  namespace: demo1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-secret-labeler
  namespace: demo1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-secret-labeler
  template:
    metadata:
      labels:
        app: argocd-secret-labeler
    spec:
      serviceAccountName: argocd-secret-labeler
      containers:
      - name: labeler
        image: alpine/k8s:1.34.0
        command:
        - /bin/sh
        - -c
        - |
          MARKER_B64="YXJnb2NkLWNsdXN0ZXItYXR0YWNo"

          echo "Starting argocd-cluster secret labeler..."
          while true; do
            # Step 1: Get just the names of secrets starting with argocd-cluster-
            NAMES=$(kubectl get secrets -A -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name --no-headers 2>/dev/null | grep "argocd-cluster-" || true)

            if [ -n "$NAMES" ]; then
              echo "$NAMES" | while read -r NS NAME; do
                # Step 2: Check marker on this specific secret
                MARKER=$(kubectl get secret -n "$NS" "$NAME" -o jsonpath='{.data.managed-by}' 2>/dev/null)
                if [ "$MARKER" = "$MARKER_B64" ]; then
                  # Step 3: Check if label already exists
                  LABEL=$(kubectl get secret -n "$NS" "$NAME" -o jsonpath='{.metadata.labels.argocd\.argoproj\.io/secret-type}' 2>/dev/null)
                  if [ "$LABEL" != "cluster" ]; then
                    echo "Labeling ${NS}/${NAME}..."
                    kubectl label secret -n "$NS" "$NAME" \
                      argocd.argoproj.io/secret-type=cluster --overwrite
                  fi
                fi
              done
            fi
            sleep 10
          done
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi