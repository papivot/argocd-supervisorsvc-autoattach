# Lightweight controller that watches for Secrets containing the marker key
# "managed-by: argocd-cluster-attach" and automatically adds the
# argocd.argoproj.io/secret-type=cluster label for ArgoCD discovery.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-secret-labeler
  namespace: demo1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-secret-labeler
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-secret-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-secret-labeler
subjects:
- kind: ServiceAccount
  name: argocd-secret-labeler
  namespace: demo1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-secret-labeler
  namespace: demo1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-secret-labeler
  template:
    metadata:
      labels:
        app: argocd-secret-labeler
    spec:
      serviceAccountName: argocd-secret-labeler
      containers:
      - name: labeler
        image: alpine/k8s:1.34.0
        command:
        - /bin/sh
        - -c
        - |
          MARKER_B64="YXJnb2NkLWNsdXN0ZXItYXR0YWNo"
          echo "Starting argocd-cluster secret labeler..."

          while true; do
            NAMESPACES=$(kubectl get namespaces -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null)
            NS_COUNT=$(echo "$NAMESPACES" | grep -c . || echo 0)
            LABELED=0

            for NS in $NAMESPACES; do
              SECRETS=$(kubectl get secrets -n "$NS" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null \
                | grep "^argocd-cluster-" || true)
              for SECRET in $SECRETS; do
                MARKER=$(kubectl get secret -n "$NS" "$SECRET" -o jsonpath='{.data.managed-by}' 2>/dev/null)
                if [ "$MARKER" = "$MARKER_B64" ]; then
                  LABEL=$(kubectl get secret -n "$NS" "$SECRET" -o jsonpath='{.metadata.labels.argocd\.argoproj\.io/secret-type}' 2>/dev/null)
                  if [ "$LABEL" != "cluster" ]; then
                    echo "[$(date -u +%H:%M:%S)] Labeling ${NS}/${SECRET}"
                    kubectl label secret -n "$NS" "$SECRET" argocd.argoproj.io/secret-type=cluster --overwrite
                    LABELED=$((LABELED + 1))
                  fi
                fi
              done
            done

            echo "[$(date -u +%H:%M:%S)] Scanned ${NS_COUNT} namespaces, labeled ${LABELED} secrets"
            sleep 10
          done
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
